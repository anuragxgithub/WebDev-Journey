<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="project_13.css">
</head>
<body>
    <div class="heading">Rock Paper Scissor</div>
    
    <div class="choices">
        <div class="choice" id="rock">
            <img src="project_13-rock.png" alt="rock-sign">
        </div>
        <div class="choice" id="paper">
            <img src="project_13-paper.png" alt="paper-sign">
        </div>
        <div class="choice" id="scissor">
            <img src="project_13-scissor.png" alt="scissor-sign">
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="player-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="computer-score">0</p>
            <p>Comp</p>
        </div>
    </div>

    
    <div class="msg-box">
        <p id="msg-content">Play your move!</p>
    </div>

    <script src="project_13.js"></script>
</body>
</html>
