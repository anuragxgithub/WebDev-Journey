<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="project_10.css">
</head>
<body>
    <div id="card">
        <form id="form">
            <h1>Cricket Quiz</h1>

            <div class="block">
                <div class="question"><b>1. Who has the most centuries in international cricket?</b></div>
                <div>
                <label>
                    <input type="radio" name="q1" id="q1" value="Sachin Tendulkar">Sachin Tendulkar</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q1" id="q1" value="Virat Kohli">Virat Kohli</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q1" id="q1" value="Ricky Ponting">Ricky Ponting</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q1" id="q1" value="Jacques Kallis">Jacques Kallis</label>
                </div>
            </div>
        
            <div class="block">
                <div class="question"><b>2. Which Country won the first ICC Cricket World Cup?</b></div>
                <div>
                <label>
                    <input type="radio" name="q2" id="q2" value="Australia">Australia</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q2" id="q2" value="England">England</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q2" id="q2" value="West Indies">West Indies</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q2" id="q2" value="India">India</label>
                </div>
            </div>

            <div class="block">
                <div class="question"><b>3. Who is known as the 'God of Cricket'?</b></div>
                <div>
                <label>
                    <input type="radio" name="q3" id="q3" value="Virat Kohli">Virat Kohli</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q3" id="q3" value="Don Bradman">Don Bradman</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q3" id="q3" value="MS Dhoni">MS Dhoni</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q3" id="q3" value="Sachin Tendulkar">Sachin Tendulkar</label>
                </div>
            </div>

            <div class="block">
                <div class="question"><b>4. What is the highest individual score in ODI cricket?</b></div>
                <div>
                <label>
                    <input type="radio" name="q4" id="q4" value="264">264</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q4" id="q4" value="200">200</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q4" id="q4" value="237">237</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q4" id="q4" value="275">275</label>
                </div>
            </div>

            <div class="block">
                <div class="question"><b>5. Which bowler has taken the most wickets in Test cricket?</b></div>
                <div>
                <label>
                    <input type="radio" name="q5" id="q5" value="Muttiah Muralitharan">Muttiah Muralitharan</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q5" id="q5" value="Shane Warne">Shane Warne</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q5" id="q5" value="James Anderson">James Anderson</label>
                </div>
                <div>
                <label>
                    <input type="radio" name="q5" id="q5" value="Anil Kumble">Anil Kumble</label>
                </div>
            </div>

            <button type="submit">Submit</button>
        </form>
        <div id="output"></div>
    </div>        
</body>
<script src="project_10.js"></script>
</html>
