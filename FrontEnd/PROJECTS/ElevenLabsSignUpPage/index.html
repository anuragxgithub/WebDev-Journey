<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ElevenLabs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="logo">
        <img src="logo.png" alt="">
    </div>
    <div class="main">  
        <h2>Create an account</h2>
        <div class="signup-method">
            <a href=""><img src="google.png" alt=""></a>
            <span>Sign up with Google</span>
        </div>
        <hr>
        <div class = "info">
            <div class="email">
                <div class="email-heading">Email</div>
                <input class="input-email" type="text">
            </div>
            <div class="password">
                <div class="password-heading">Password</div>
                <input type="password" class="input-password">
            </div>
        </div>
        <div class="btn">
            <div>Sign Up</div>
        </div>
        <div class="registered">
            <p>Already registered?<a href="">Sign in</a></p>
        </div>
    </div>

    <div class="footer">
        <div class="footer-text">By continuing, you agree to our <a href="">Terms of Service</a> and <a href="">Privacy Policy</a>.</div>
    </div>
</body>
</html>
